services:
  quiz:
    build: .
    container_name: valdoise-quiz
    restart: unless-stopped
    ports:
      - "3012:3012"
    volumes:
      - quiz-data:/app/data
    entrypoint: ["/bin/sh", "-c", "ln -sf /app/data/quiz.db /app/quiz.db && node dist/main.js"]
    environment:
      - PORT=3012
      - NODE_ENV=production

volumes:
  quiz-data:
