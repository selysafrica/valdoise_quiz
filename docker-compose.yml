services:
  quiz:
    build: .
    container_name: valdoise-quiz
    restart: unless-stopped
    ports:
      - "3012:3012"
    volumes:
      - quiz-data:/app/quiz.db
    environment:
      - PORT=3012
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: valdoise-quiz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - quiz

  certbot:
    image: certbot/certbot
    container_name: valdoise-quiz-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  quiz-data:
